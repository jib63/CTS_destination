<!DOCTYPE html>
<!-- Weather footer mockup — open in a browser to preview the HMI -->
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTS — Mockup météo</title>
<style>
/* ── Reset ── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --line-A:#c8102e; --line-B:#7b2d8b; --line-C:#e07b10;
    --line-D:#2e8b3c; --line-E:#6f2c91; --line-F:#c5145b; --line-G:#5c6bc0;
    --header-bg: #1a2744;
    --row-dark:  #1966b8;
    --row-light: #2474cc;
    --text:      #ffffff;
    --subtext:   rgba(255,255,255,0.75);
}

html, body { height:100%; width:100%; overflow:hidden; background:#0d1b3e; color:#fff;
    font-family: -apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }

/* ── Board ── */
#board { display:flex; flex-direction:column; width:100vw; height:100vh; }

/* ── Header ── */
#header {
    background:var(--header-bg);
    display:flex; align-items:center; gap:clamp(0.5rem,2vw,2rem);
    padding:clamp(0.4rem,1.2vh,1rem) clamp(0.5rem,1.5vw,1.5rem);
    flex-shrink:0;
    border-bottom:2px solid rgba(255,255,255,0.12);
}
#clock  { font-size:clamp(1.4rem,4vw,2.6rem); font-weight:700; letter-spacing:0.05em; }
#date   { font-size:clamp(0.9rem,2.5vw,1.6rem); font-weight:500; }
#branding { font-size:clamp(0.75rem,2vw,1.3rem); font-weight:700; margin-left:auto; }
.brand-euro { font-size:0.6em; font-weight:400; vertical-align:super; color:var(--subtext); }
#logo { background:white; border-radius:4px; padding:0.1em 0.3em;
    font-size:clamp(1rem,2.5vw,1.8rem); font-weight:900; line-height:1; letter-spacing:-0.02em; }
.logo-c{color:#e2001a;} .logo-t{color:#003f8a;} .logo-s{color:#e2001a;}
#col-headers { display:flex; gap:clamp(0.5rem,3vw,3rem);
    font-size:clamp(0.6rem,1.5vw,1rem); font-weight:700;
    letter-spacing:0.08em; color:var(--subtext); }
.col-label { min-width:clamp(100px,20vw,220px); text-align:center; }
#status-btn { background:none; border:none; padding:0.3em 0.4em; cursor:pointer; display:flex; align-items:center; }
#status-dot { display:block; width:clamp(0.7rem,1.6vw,1rem); height:clamp(0.7rem,1.6vw,1rem);
    border-radius:50%; background:#4caf50; }

/* ── Departures ── */
#departures { display:flex; flex-direction:column; overflow:hidden; flex-shrink:1; }
.departure-row {
    display:grid;
    grid-template-columns: auto 1fr clamp(100px,20vw,220px) clamp(100px,20vw,220px);
    align-items:center; column-gap:0; row-gap:0;
    padding:0 0 0 clamp(0.75rem,2vw,2rem);
    height:clamp(100px,15vh,150px); flex-shrink:0;
}
.departure-row:nth-child(odd)  { background:var(--row-light); }
.departure-row:nth-child(even) { background:var(--row-dark); }
.line-badge {
    display:inline-flex; align-items:center; justify-content:center;
    width:clamp(2.8rem,7vw,5.5rem); height:clamp(2.8rem,7vw,5.5rem);
    border-radius:8px; font-weight:900; font-size:clamp(1.6rem,5vw,3.8rem);
    color:white; flex-shrink:0; text-shadow:0 1px 3px rgba(0,0,0,0.4);
    margin-right:clamp(0.6rem,2vw,2rem);
}
.destination { font-size:clamp(1.3rem,3.8vw,3rem); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.time-cell {
    text-align:center; font-size:clamp(1.8rem,5.5vw,4.2rem); font-weight:900;
    display:flex; align-items:center; justify-content:center; gap:0.15em;
    border-left:3px solid var(--header-bg);
    padding:0 clamp(1.5rem,4.5vw,5rem); align-self:stretch;
}
.time-cell .unit { font-size:0.42em; font-weight:600; color:var(--subtext); }

/* ── Board footer ── */
#board-footer {
    flex: 1 0 0;
    background: var(--header-bg);
    border-top: 1px solid rgba(255,255,255,0.08);
    min-height: 0;
    display: flex;
    align-items: center;
}

/* ── Weather row ── */
#weather-row {
    display: flex;
    align-items: center;
    gap: clamp(0.8rem, 2.5vw, 2.5rem);
    padding: clamp(0.6rem, 2vh, 1.5rem) clamp(0.75rem, 2vw, 2rem);
    width: 100%;
    font-size: clamp(1rem, 2.8vw, 1.8rem);
}

#weather-icon {
    width:  clamp(3rem, 7vw, 5.5rem);
    height: clamp(3rem, 7vw, 5.5rem);
    flex-shrink: 0;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.4));
}

/* Separator between weather groups */
.wx-sep-bar {
    width: 1px;
    background: rgba(255,255,255,0.18);
    align-self: stretch;
    margin: 0.3em 0;
}

/* Temp badges */
.wx-temp-max {
    background: #2e7d32;
    color: #fff;
    border-radius: 5px;
    padding: 0.12em 0.5em;
    font-weight: 800;
    font-size: 1em;
    white-space: nowrap;
    letter-spacing: -0.01em;
}
.wx-temp-min {
    background: #1565c0;
    color: #fff;
    border-radius: 5px;
    padding: 0.12em 0.5em;
    font-weight: 800;
    font-size: 1em;
    white-space: nowrap;
    letter-spacing: -0.01em;
}
.wx-temp-now {
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    font-size: 0.92em;
    white-space: nowrap;
}

/* Data items (rain, sun) */
.wx-item {
    display: flex;
    align-items: center;
    gap: 0.35em;
    color: rgba(255,255,255,0.88);
    white-space: nowrap;
}
.wx-label {
    font-size: 0.7em;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.45);
    text-transform: uppercase;
    display: block;
    margin-bottom: 0.1em;
}
.wx-group {
    display: flex;
    flex-direction: column;
    gap: 0.05em;
}
.wx-temps {
    display: flex;
    align-items: center;
    gap: 0.4em;
}
.wx-value {
    font-size: 0.95em;
    font-weight: 700;
}
.wx-unit {
    font-size: 0.72em;
    font-weight: 500;
    color: rgba(255,255,255,0.55);
}
.wx-location {
    margin-left: auto;
    font-size: 0.72em;
    color: rgba(255,255,255,0.35);
    font-weight: 500;
    letter-spacing: 0.03em;
    white-space: nowrap;
    padding-right: 0.5em;
}
</style>
</head>
<body>

<!-- ── Board ── -->
<div id="board">

  <header id="header">
    <div id="clock">14:27</div>
    <div id="date">12 avril 2026</div>
    <button id="config-btn" style="background:none;border:1.5px solid rgba(255,255,255,0.35);border-radius:6px;color:rgba(255,255,255,0.85);padding:.3em .7em;font-size:clamp(.7rem,1.5vw,.95rem);font-weight:600;cursor:pointer;">Configuration</button>
    <button id="status-btn"><span id="status-dot"></span></button>
    <div id="branding">
      <span class="brand-bus">bus</span><span class="brand-tram">tram</span>
      <sup class="brand-euro">eurométropole</sup>
    </div>
    <div id="logo">
      <span class="logo-c">c</span><span class="logo-t">T</span><span class="logo-s">s</span>
    </div>
    <div id="col-headers">
      <span class="col-label">PROCHAIN</span>
      <span class="col-label">SUIVANT</span>
    </div>
  </header>

  <div id="departures">
    <!-- Row 1 -->
    <div class="departure-row">
      <div class="line-badge" style="background:#e07b10">C</div>
      <div class="destination">Gare Centrale</div>
      <div class="time-cell"><span>3</span><span class="unit">min</span></div>
      <div class="time-cell"><span>8</span><span class="unit">min</span></div>
    </div>
    <!-- Row 2 -->
    <div class="departure-row">
      <div class="line-badge" style="background:#2e8b3c">D</div>
      <div class="destination">Poteries</div>
      <div class="time-cell"><span>5</span><span class="unit">min</span></div>
      <div class="time-cell"><span>12</span><span class="unit">min</span></div>
    </div>
    <!-- Row 3 -->
    <div class="departure-row">
      <div class="line-badge" style="background:#546e7a">10</div>
      <div class="destination">Campus</div>
      <div class="time-cell" style="font-size:clamp(1rem,3.5vw,2.5rem);font-style:italic;opacity:.7"><span>7</span><span class="unit">min</span></div>
      <div class="time-cell" style="font-size:clamp(1rem,3.5vw,2.5rem);font-style:italic;opacity:.7"><span>19</span><span class="unit">min</span></div>
    </div>
  </div>

  <!-- ── Weather footer ── -->
  <div id="board-footer">
    <div id="weather-row">

      <!-- Weather icon -->

      </svg>

      <!-- Temperature group: min / max badges -->

        <span class="wx-label">Température</span>

    </div>

</div>

<!-- ── Switcher to try different weather conditions ── -->
<div id="switcher" style="
    position:fixed; bottom:0; left:0; right:0;
    background:rgba(0,0,0,0.75); backdrop-filter:blur(6px);
    display:flex; gap:0.5rem; flex-wrap:wrap; padding:0.5rem 1rem;
    border-top:1px solid rgba(255,255,255,0.1);
    font-family:inherit;
    z-index:200;
">
  <span style="color:rgba(255,255,255,0.45);font-size:0.75rem;align-self:center;margin-right:0.25rem">Aperçu icône&nbsp;:</span>
  <button onclick="setIcon('w-sunny')"          class="sw-btn">☀ Ensoleillé</button>
  <button onclick="setIcon('w-mostly-sunny')"   class="sw-btn">🌤 Beau temps</button>
  <button onclick="setIcon('w-partly-cloudy')"  class="sw-btn">⛅ Nuageux</button>
  <button onclick="setIcon('w-cloudy')"         class="sw-btn">☁ Couvert</button>
  <button onclick="setIcon('w-fog')"            class="sw-btn">🌫 Brouillard</button>
  <button onclick="setIcon('w-drizzle')"        class="sw-btn">🌦 Bruine</button>
  <button onclick="setIcon('w-rain')"           class="sw-btn">🌧 Pluie</button>
  <button onclick="setIcon('w-thunder')"        class="sw-btn">⛈ Orage</button>
  <button onclick="setIcon('w-sleet')"          class="sw-btn">🌨 Grésil</button>
  <button onclick="setIcon('w-snow')"           class="sw-btn">❄ Neige</button>
  <button onclick="setIcon('w-night-clear')"    class="sw-btn">🌙 Nuit claire</button>
  <button onclick="setIcon('w-night-cloudy')"   class="sw-btn">🌙☁ Nuit nuageuse</button>
</div>

<style>
.sw-btn {
    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:5px;
    color:white;
    padding:0.25em 0.6em;
    font-size:0.78rem;
    cursor:pointer;
    transition:background 0.12s;
}
.sw-btn:hover { background:rgba(255,255,255,0.22); }
</style>

<script>
// Live clock
function tick() {
    var now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    document.getElementById("date").textContent =
        now.toLocaleDateString("fr-FR",{day:"numeric",month:"long",year:"numeric"});
}
tick();
setInterval(tick, 1000);
