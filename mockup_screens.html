<body>
<h1>Pixoo64 — Rotation d'écrans</h1>
<p class="note">Rendu pixel exact · police 5×7 bitmap · grille = 1 LED · 5× agrandissement</p>

<div id="root"></div>

<script>
// ── Police bitmap 5×7 (src/pixoo64/font.rs) ──────────────────────────────────
const FONT = {
  ' ':[0x00,0x00,0x00,0x00,0x00,0x00,0x00],
  '!':[0x20,0x20,0x20,0x20,0x00,0x20,0x00],
  '-':[0x00,0x00,0x00,0xF8,0x00,0x00,0x00],
  '.':[0x00,0x00,0x00,0x00,0x00,0x60,0x60],
  '/':[0x08,0x10,0x10,0x20,0x40,0x40,0x80],
  '+':[0x00,0x20,0x20,0xF8,0x20,0x20,0x00],
  '0':[0x70,0x88,0x98,0xA8,0xC8,0x88,0x70],
  '1':[0x20,0x60,0x20,0x20,0x20,0x20,0x70],
  '2':[0x70,0x88,0x08,0x30,0x40,0x80,0xF8],
  '3':[0x70,0x88,0x08,0x30,0x08,0x88,0x70],
  '4':[0x10,0x30,0x50,0x90,0xF8,0x10,0x10],
  '5':[0xF8,0x80,0xF0,0x08,0x08,0x88,0x70],
  '6':[0x38,0x40,0x80,0xF0,0x88,0x88,0x70],
  '7':[0xF8,0x08,0x10,0x20,0x20,0x20,0x20],
  '8':[0x70,0x88,0x88,0x70,0x88,0x88,0x70],
  '9':[0x70,0x88,0x88,0x78,0x08,0x10,0xE0],
  ':':[0x00,0x60,0x60,0x00,0x60,0x60,0x00],
  'A':[0x20,0x50,0x88,0x88,0xF8,0x88,0x88],
  'B':[0xF0,0x88,0x88,0xF0,0x88,0x88,0xF0],
  'C':[0x70,0x88,0x80,0x80,0x80,0x88,0x70],
  'D':[0xE0,0x90,0x88,0x88,0x88,0x90,0xE0],
  'E':[0xF8,0x80,0x80,0xF0,0x80,0x80,0xF8],
  'F':[0xF8,0x80,0x80,0xF0,0x80,0x80,0x80],
  'G':[0x70,0x88,0x80,0xB8,0x88,0x88,0x70],
  'H':[0x88,0x88,0x88,0xF8,0x88,0x88,0x88],
  'I':[0x70,0x20,0x20,0x20,0x20,0x20,0x70],
  'J':[0x38,0x10,0x10,0x10,0x90,0x90,0x60],
  'K':[0x88,0x90,0xA0,0xC0,0xA0,0x90,0x88],
  'L':[0x80,0x80,0x80,0x80,0x80,0x80,0xF8],
  'M':[0x88,0xD8,0xA8,0xA8,0x88,0x88,0x88],
  'N':[0x88,0xC8,0xA8,0x98,0x88,0x88,0x88],
  'O':[0x70,0x88,0x88,0x88,0x88,0x88,0x70],
  'P':[0xF0,0x88,0x88,0xF0,0x80,0x80,0x80],
  'Q':[0x70,0x88,0x88,0x88,0xA8,0x90,0x68],
  'R':[0xF0,0x88,0x88,0xF0,0xA0,0x90,0x88],
  'S':[0x70,0x88,0x80,0x70,0x08,0x88,0x70],
  'T':[0xF8,0x20,0x20,0x20,0x20,0x20,0x20],
  'U':[0x88,0x88,0x88,0x88,0x88,0x88,0x70],
  'V':[0x88,0x88,0x88,0x88,0x50,0x50,0x20],
  'W':[0x88,0x88,0x88,0xA8,0xA8,0xD8,0x88],
  'X':[0x88,0x88,0x50,0x20,0x50,0x88,0x88],
  'Y':[0x88,0x88,0x50,0x20,0x20,0x20,0x20],
  'Z':[0xF8,0x08,0x10,0x20,0x40,0x80,0xF8],
  'a':[0x00,0x60,0x10,0x70,0x88,0x98,0x68],
  'b':[0x80,0x80,0xB0,0xC8,0x88,0xC8,0xB0],
  'c':[0x00,0x00,0x70,0x80,0x80,0x80,0x70],
  'd':[0x08,0x08,0x68,0x98,0x88,0x98,0x68],
  'e':[0x00,0x00,0x70,0x88,0xF8,0x80,0x70],
  'f':[0x30,0x40,0xF0,0x40,0x40,0x40,0x40],
  'g':[0x00,0x68,0x98,0x88,0x78,0x08,0x70],
  'h':[0x80,0x80,0xB0,0xC8,0x88,0x88,0x88],
  'i':[0x20,0x00,0x60,0x20,0x20,0x20,0x70],
  'j':[0x10,0x00,0x30,0x10,0x10,0x90,0x60],
  'k':[0x80,0x90,0xA0,0xC0,0xA0,0x90,0x88],
  'l':[0x60,0x20,0x20,0x20,0x20,0x20,0x70],
  'm':[0x00,0x00,0xD0,0xA8,0xA8,0xA8,0x88],
  'n':[0x00,0x00,0xB0,0xC8,0x88,0x88,0x88],
  'o':[0x00,0x00,0x70,0x88,0x88,0x88,0x70],
  'p':[0x00,0xB0,0xC8,0x88,0xC8,0xB0,0x80],
  'q':[0x00,0x68,0x98,0x88,0x98,0x68,0x08],
  'r':[0x00,0x00,0xB0,0xC8,0x80,0x80,0x80],
  's':[0x00,0x00,0x70,0x80,0x70,0x08,0x70],
  't':[0x40,0x40,0xF0,0x40,0x40,0x48,0x30],
  'u':[0x00,0x00,0x88,0x88,0x88,0x98,0x68],
  'v':[0x00,0x00,0x88,0x88,0x88,0x50,0x20],
  'w':[0x00,0x00,0x88,0xA8,0xA8,0xD8,0x88],
  'x':[0x00,0x00,0x88,0x50,0x20,0x50,0x88],
  'y':[0x00,0x88,0x88,0x78,0x08,0x88,0x70],
  'z':[0x00,0x00,0xF8,0x10,0x20,0x40,0xF8],
  '°':[0x60,0x90,0x90,0x60,0x00,0x00,0x00],
  '*':[0x00,0x20,0xA8,0x70,0xA8,0x20,0x00],
};

// ── Primitives ────────────────────────────────────────────────────────────────
const S = 5;

function drawChar(ctx, gx, gy, ch, r, g, b, sc) {
  sc = sc || 1;
  const gl = FONT[ch] || FONT[' '];
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  for (let row = 0; row < 7; row++) {
    const mask = gl[row];
    for (let col = 0; col < 5; col++) {
      if (mask & (0x80 >> col))
        ctx.fillRect((gx+col*sc)*S, (gy+row*sc)*S, sc*S, sc*S);
    }
  }
}

function tw(str, sc) { sc=sc||1; return str.length ? str.length*6*sc - sc : 0; }

// Draw text left-aligned; optional clipW (grid units from gx before clipping)
function drawText(ctx, gx, gy, str, r, g, b, sc, clipW) {
  sc = sc || 1;
  const lim = (clipW != null) ? gx + clipW : 9999;
  let x = gx;
  for (const ch of str) {
    if (x >= lim) break;
    drawChar(ctx, x, gy, ch, r, g, b, sc);
    x += 6 * sc;
  }
}

// Draw text right-aligned ending at pixel rx
function drawTextR(ctx, rx, gy, str, r, g, b, sc) {
  sc = sc || 1;
  drawText(ctx, rx - tw(str, sc), gy, str, r, g, b, sc);
}

// Draw text centred at cx
function drawTextC(ctx, cx, gy, str, r, g, b, sc) {
  sc = sc || 1;
  drawText(ctx, cx - Math.floor(tw(str, sc) / 2), gy, str, r, g, b, sc);
}

function fr(ctx, gx, gy, gw, gh, r, g, b) {
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  ctx.fillRect(gx*S, gy*S, gw*S, gh*S);
}

function drawGrid(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 64; i++) {
    ctx.beginPath(); ctx.moveTo(i*S, 0);    ctx.lineTo(i*S, 64*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,   i*S);  ctx.lineTo(64*S, i*S); ctx.stroke();
  }
}

function badge(ctx, gx, gy, size, letter, r, g, b) {
  fr(ctx, gx, gy, size, size, r, g, b);
  drawChar(ctx, gx + Math.floor((size-5)/2), gy + Math.floor((size-7)/2), letter, 255, 255, 255, 1);
}

function mkCanvas() {
  const c = document.createElement('canvas');
  c.width = 64*S; c.height = 64*S; return c;
}

// ── Line colors ───────────────────────────────────────────────────────────────
const LC = {
  A: [200,  16,  46],
  B: [123,  45, 139],
  C: [224, 123,  16],
  D: [ 46, 139,  60],
  E: [111,  44, 145],
};

// Subtle background tint derived from line color
function tint(lr, lg, lb) {
  return [Math.round(lr*12/100+5), Math.round(lg*12/100+9), Math.round(lb*12/100+16)];
}

// ── Split destination for 2-line display ─────────────────────────────────────
// Returns [l1, l2]. l1 ≤ maxL1 chars, l2 ≤ maxL2 chars, split on space/hyphen.
function splitDest(dest, maxL1, maxL2) {
  maxL2 = (maxL2 !== undefined) ? maxL2 : maxL1;
  const chars = [...dest];
  if (chars.length <= maxL1) return [dest, ''];
  let split = maxL1;
  for (let i = Math.min(maxL1, chars.length - 1); i >= 0; i--) {
    if (chars[i] === ' ') { split = i; break; }
    if (chars[i] === '-') { split = i + 1; break; }
  }
  split = Math.min(split, chars.length);
  const l1 = chars.slice(0, split).join('').trimEnd();
  const l2s = (split < chars.length && chars[split] === ' ') ? split + 1 : split;
  const l2 = chars.slice(l2s, l2s + maxL2).join('');
  return [l1, l2];
}

// ── Common header (y=0..9): clock · weather icon · temp ──────────────────────
function drawHeader(ctx) {
  fr(ctx, 0, 0, 64, 9, 14, 20, 40);
  drawText(ctx, 1, 1, '11:42', 255, 255, 255, 1);
  drawWeatherSm(ctx, 37, 2);  // sun icon
  drawTextR(ctx, 63, 1, '18°', 180, 220, 255, 1);
  fr(ctx, 0, 9, 64, 1, 30, 50, 80);
}

// ── Weather icons ─────────────────────────────────────────────────────────────
// Small sun (6×5) for header
function drawWeatherSm(ctx, x, y) {
  fr(ctx, x+2, y,   2, 1, 255, 220, 0);
  fr(ctx, x+1, y+1, 4, 3, 255, 220, 0);
  fr(ctx, x+2, y+4, 2, 1, 255, 220, 0);
}

// Large sun (16×16) for weather screen
function drawWeatherLg(ctx, x, y) {
  fr(ctx, x+4,  y+4,  8, 8, 255, 220, 0);   // sun body
  fr(ctx, x+7,  y+0,  2, 3, 255, 195, 0);   // top ray
  fr(ctx, x+7,  y+13, 2, 3, 255, 195, 0);   // bottom ray
  fr(ctx, x+0,  y+7,  3, 2, 255, 195, 0);   // left ray
  fr(ctx, x+13, y+7,  3, 2, 255, 195, 0);   // right ray
  fr(ctx, x+2,  y+2,  2, 2, 240, 175, 0);   // diag TL
  fr(ctx, x+12, y+2,  2, 2, 240, 175, 0);   // diag TR
  fr(ctx, x+2,  y+12, 2, 2, 240, 175, 0);   // diag BL
  fr(ctx, x+12, y+12, 2, 2, 240, 175, 0);   // diag BR
}

// Partly cloudy (16×16)
function drawCloudLg(ctx, x, y) {
  fr(ctx, x+5, y+1,  6, 4, 240, 200, 60);  // sun behind
  fr(ctx, x+3, y+6, 10, 4, 190, 190, 210); // upper cloud
  fr(ctx, x+1, y+8, 14, 5, 210, 210, 220); // lower cloud
}

// ── Pixel-art icons (7×6) for birthday screen ─────────────────────────────────
function drawPresent(ctx, x, y) {
  fr(ctx, x,   y+3, 6, 3, 91, 142, 238);   // box body
  fr(ctx, x,   y+2, 6, 1, 122,170,245);    // lid
  fr(ctx, x+2, y+2, 2, 4, 230,220,168);    // ribbon vertical
  fr(ctx, x,   y+3, 6, 1, 230,220,168);    // ribbon horizontal
  fr(ctx, x+1, y,   2, 2, 232,112,112);    // bow left
  fr(ctx, x+3, y,   2, 2, 232,112,112);    // bow right
}

function drawHeart(ctx, x, y) {
  fr(ctx, x+1, y,   2, 1, 220, 60, 60);
  fr(ctx, x+4, y,   2, 1, 220, 60, 60);
  fr(ctx, x+0, y+1, 6, 2, 220, 60, 60);
  fr(ctx, x+1, y+3, 4, 2, 220, 60, 60);
  fr(ctx, x+2, y+5, 2, 1, 220, 60, 60);
}

function drawCake(ctx, x, y) {
  fr(ctx, x+2, y,   1, 1, 255, 220, 80);   // flame
  fr(ctx, x+2, y+1, 1, 2, 200, 200, 220);  // candle
  fr(ctx, x+0, y+3, 6, 1, 210, 190, 240);  // frosting
  fr(ctx, x+0, y+4, 6, 3, 190, 155, 220);  // cake
  fr(ctx, x+1, y+5, 1, 1, 255, 100, 100);  // decoration
  fr(ctx, x+3, y+5, 1, 1, 100, 200, 100);
  fr(ctx, x+5, y+5, 1, 1, 100, 100, 255);
}

// ── Screen A: 2 trams (stop 298B) ────────────────────────────────────────────
//   row_h=27 | sub-zones h=9: [badge+time] [dest L1] [dest L2]
function screen2trams() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx, 0, 0, 64, 64, 6, 10, 20);
  drawHeader(ctx);

  const rows = [
    { letter:'A', dest:'Hautepierre', time:'3' },
    { letter:'B', dest:'Illkirch',    time:'7' },
  ];

  rows.forEach((row, i) => {
    const [lr,lg,lb] = LC[row.letter];
    const [br,bg,bb] = tint(lr,lg,lb);
    const y = 10 + i * 27;

    fr(ctx, 0, y, 64, 27, br, bg, bb);  // tinted bg
    fr(ctx, 0, y,  5, 27, lr, lg, lb);  // accent bar full height
    badge(ctx, 6, y, 9, row.letter, lr, lg, lb);  // 9×9 badge in zone 1
    drawTextR(ctx, 63, y+1, row.time, 255, 220, 80, 1);  // time yellow right

    const [l1, l2] = splitDest(row.dest, 9);
    drawText(ctx, 6, y+10, l1, 200, 212, 235, 1);         // dest L1
    if (l2) drawText(ctx, 6, y+19, l2, 140, 150, 175, 1); // dest L2
  });

  drawGrid(ctx); return c;
}

// ── Screen B: 3 trams (stop 298A) ────────────────────────────────────────────
//   row_h=18 | zone 1 h=9: badge+destL1(x=17,clip)+time | zone 2 h=9: destL2(x=6)
function screen3trams() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx, 0, 0, 64, 64, 6, 10, 20);
  drawHeader(ctx);

  const rows = [
    { letter:'C', dest:'Elsau',      time:'5'  },
    { letter:'D', dest:'Robertsau',  time:'12' },
    { letter:'E', dest:'Illkirch',   time:'3'  },
  ];

  rows.forEach((row, i) => {
    const [lr,lg,lb] = LC[row.letter];
    const [br,bg,bb] = tint(lr,lg,lb);
    const y = 10 + i * 18;

    fr(ctx, 0, y, 64, 18, br, bg, bb);
    fr(ctx, 0, y,  5, 18, lr, lg, lb);
    badge(ctx, 6, y, 9, row.letter, lr, lg, lb);
    drawTextR(ctx, 63, y+1, row.time, 255, 220, 80, 1);

    // L1: right of badge (x=17), clip before time (max 5 chars)
    const [l1, l2] = splitDest(row.dest, 5, 7);
    drawText(ctx, 17, y+1, l1, 200, 212, 235, 1, 35);   // clipW=35 → lim=52
    if (l2) drawText(ctx, 6, y+10, l2, 140, 150, 175, 1); // L2 full width in zone 2
  });

  drawGrid(ctx); return c;
}

// ── Screen C: 4 trams (compact, single line each) ────────────────────────────
//   row_h=13 | badge 7×7 | dest clips | time right
function screen4trams() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx, 0, 0, 64, 64, 6, 10, 20);
  drawHeader(ctx);

  const rows = [
    { letter:'A', dest:'Hautepierre',  time:'3'  },
    { letter:'B', dest:'Illkirch',     time:'7'  },
    { letter:'C', dest:'Elsau',        time:'5'  },
    { letter:'D', dest:'Robertsau',    time:'12' },
  ];

  rows.forEach((row, i) => {
    const [lr,lg,lb] = LC[row.letter];
    const [br,bg,bb] = tint(lr,lg,lb);
    const y  = 10 + i * 13;
    const ty = y + Math.floor((13-7)/2);  // text vertical centre

    fr(ctx, 0, y, 64, 13, br, bg, bb);
    fr(ctx, 0, y,  5, 13, lr, lg, lb);
    badge(ctx, 6, ty, 7, row.letter, lr, lg, lb);  // 7×7 badge
    drawText(ctx, 15, ty, row.dest.slice(0, 5), 200, 212, 235, 1);  // 5-char clip
    drawTextR(ctx, 63, ty, row.time, 255, 220, 80, 1);
  });

  fr(ctx, 0, 62, 64, 2, 6, 10, 20);  // fill bottom 2px gap
  drawGrid(ctx); return c;
}

// ── Screen D: Weather ─────────────────────────────────────────────────────────
//   y=10..25: large icon   y=28..34: current temp ×1 (centred)
//   y=37..43: min/max      y=47..53: label
//   y=55:     separator    y=57..63: location / bonus row
function screenWeather() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx, 0, 0, 64, 64, 8, 12, 26);
  drawHeader(ctx);

  // Large weather icon (sun, 16×16) centred horizontally at y=10
  drawWeatherLg(ctx, 24, 10);  // x=24 centres 16px icon in 64px: (64-16)/2=24

  // Current temp "18°" scale=1 centred, y=28
  drawTextC(ctx, 32, 28, '18°', 255, 220, 80, 1);

  // Min / max, y=37
  drawText(ctx, 2, 37, '6°',    100, 150, 255, 1);   // min in blue
  drawTextC(ctx, 32, 37, '-',    60,  70, 110, 1);    // separator centred
  drawTextR(ctx, 62, 37, '22°', 255, 140,  60, 1);   // max in orange

  // Weather label centred, y=47
  drawTextC(ctx, 32, 47, 'Ensoleille', 170, 210, 170, 1);

  // Separator + location name row, y=55..63
  fr(ctx, 0, 55, 64, 1, 22, 32, 58);
  drawWeatherSm(ctx, 1, 57);
  drawText(ctx, 9, 57, 'Strasbourg', 120, 140, 160, 1);

  drawGrid(ctx); return c;
}

// ── Birthday helpers ──────────────────────────────────────────────────────────

// Split a label into two lines: l1 ≤ 8 chars (icon side), l2 ≤ 10 chars (full width).
function splitBdayLabel(label) {
  if (label.length <= 8) return [label, ''];
  let split = 8;
  for (let i = 8; i >= 0; i--) {
    if (label[i] === ' ' || label[i] === '-') { split = (label[i] === '-') ? i + 1 : i; break; }
  }
  const l1 = label.slice(0, split);
  const l2Start = (split < label.length && label[split] === ' ') ? split + 1 : split;
  return [l1, label.slice(l2Start, l2Start + 10)];
}

// Draw one birthday row (1 or 2 lines). Returns height used.
function drawBdayRow(ctx, y, slot, row) {
  const [l1, l2] = splitBdayLabel(row.label);
  const h = l2 ? 18 : 9;
  const bgR = (slot % 2 === 0) ? 18 : 14;
  const bgG = (slot % 2 === 0) ? 13 : 10;
  const bgB = (slot % 2 === 0) ? 34 : 28;
  fr(ctx, 0, y, 64, h, bgR, bgG, bgB);
  fr(ctx, 0, y,  2, h, row.accentR, row.accentG, row.accentB);
  if (row.icon === 'cake')    drawCake(ctx, 3, y + 1);
  if (row.icon === 'present') drawPresent(ctx, 3, y + 1);
  if (row.icon === 'heart')   drawHeart(ctx, 3, y + 1);
  drawText(ctx, 11, y + 1, l1, row.textR, row.textG, row.textB, 1);
  if (l2) drawText(ctx, 3, y + 10, l2, row.textR, row.textG, row.textB, 1);
  return h;
}

// Greedy paginate rows into pages fitting 54px content height.
function paginateBdayRows(rows) {
  const pages = [];
  let page = [], used = 0;
  for (const row of rows) {
    const h = splitBdayLabel(row.label)[1] ? 18 : 9;
    if (used + h > 54 && page.length > 0) { pages.push(page); page = []; used = 0; }
    page.push(row); used += h;
  }
  if (page.length > 0) pages.push(page);
  return pages.length ? pages : [[]];
}

// ── Screen E: Anniversaires / Jour-J ─────────────────────────────────────────
//   Rows of h=9 (1 line) or h=18 (2 lines). Paginated if content exceeds 54px.
function screenBirthdayPage(pageRows) {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx, 0, 0, 64, 64, 14, 10, 30);

  // Header — purple tint
  fr(ctx, 0, 0, 64, 9, 42, 18, 62);
  drawText(ctx, 1, 1, 'Anniversaires', 230, 200, 255, 1);
  fr(ctx, 0, 9, 64, 1, 65, 35, 85);

  if (pageRows.length === 0) {
    drawText(ctx, 8, 30, 'Aucun', 80, 70, 100, 1);
    drawText(ctx, 2, 39, 'evenement', 80, 70, 100, 1);
    drawGrid(ctx); return c;
  }

  let y = 10;
  pageRows.forEach((row, slot) => { y += drawBdayRow(ctx, y, slot, row); });

  drawGrid(ctx); return c;
}

// ── Rotation strip (CSS-scaled to 128px) ─────────────────────────────────────
function mkMini(drawFn) {
  const c = mkCanvas();
  c.style.width  = '128px';
  c.style.height = '128px';
  drawFn(c.getContext('2d'));
  return c;
}

// ── Build page ────────────────────────────────────────────────────────────────
const root = document.getElementById('root');

function section(title) {
  const h = document.createElement('h2');
  h.textContent = title;
  root.appendChild(h);
}

function addRow(items) {
  const row = document.createElement('div');
  row.className = 'row';
  for (const [canvas, title, desc] of items) {
    const card = document.createElement('div');
    card.className = 'card';
    const h = document.createElement('h3');
    h.textContent = title;
    const p = document.createElement('p');
    p.textContent = desc;
    card.appendChild(canvas);
    card.appendChild(h);
    card.appendChild(p);
    row.appendChild(card);
  }
  root.appendChild(row);
}

  [screen3trams(), '3 lignes — row_h=18px',
   'Zone 1 : badge + dest L1 (5 car.) + heure. Zone 2 : dest L2 pleine largeur (7 car.).'],
  [screen4trams(), '4 lignes — row_h=13px',

]);

  [screenBirthday2(), 'Anniversaires & Jour-J — page 2',
   'Overflow vers un second écran. La rotation inclut autant de pages que nécessaire.'],
]);

// Rotation strip
section('Rotation automatique (~7s par écran)');
const strip = document.createElement('div');
strip.className = 'rot-strip';

const stripItems = [
  [screen2trams,    'Stop 298B',      '2 lignes tram'],
  [screen3trams,    'Stop 298A',      '3 lignes tram'],
  [screenWeather,   'Météo',          'Ensoleillé 18°'],
  [screenBirthday,  'Anniv. p.1',     'Jour-J · bdays'],
  [screenBirthday2, 'Anniv. p.2',     'suite bdays'],
];

stripItems.forEach(([fn, label, sub], idx) => {
  if (idx > 0) {
    const arr = document.createElement('div');
    arr.innerHTML = '&#8594;';
    arr.className = 'rot-arrow';
    const sec = document.createElement('div');
    sec.textContent = '~7s';
    sec.className = 'rot-sec';
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.flexDirection = 'column';
    wrap.style.alignItems = 'center';
    wrap.appendChild(arr);
    wrap.appendChild(sec);
    strip.appendChild(wrap);
  }
  const item = document.createElement('div');
  item.className = 'rot-item';
  const mini = mkMini(ctx => fn().getContext && (() => {})() || (c => { c.getContext('2d').drawImage(fn(), 0, 0); })(mkCanvas()));
  // Draw fresh mini canvas
  const mc = mkCanvas();
  mc.style.width  = '128px';
  mc.style.height = '128px';
  const mctx = mc.getContext('2d');
  mctx.drawImage(fn(), 0, 0);
  const lbl = document.createElement('div');
  lbl.className = 'rot-label';
  lbl.innerHTML = label + '<br><span style="color:#445">' + sub + '</span>';
  item.appendChild(mc);
  item.appendChild(lbl);
  strip.appendChild(item);
});

root.appendChild(strip);
</script>
