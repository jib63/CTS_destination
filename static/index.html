<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTS — Prochains passages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ── Departure board ── -->
    <div id="board">
        <header id="header">
            <div id="clock">--:--</div>
            <div id="date">--</div>
            <button id="config-btn" title="Choisir un arrêt">Configuration</button>
            <button id="status-btn" title="État du système"><span id="status-dot"></span></button>
            <div id="branding">
                <span class="brand-bus">bus</span><span class="brand-tram">tram</span>
                <sup class="brand-euro">eurométropole</sup>
            </div>
            <div id="logo">
                <span class="logo-c">c</span><span class="logo-t">T</span><span class="logo-s">s</span>
            </div>
            <div id="col-headers">
                <span class="col-label">PROCHAIN</span>
                <span class="col-label">SUIVANT</span>
            </div>
        </header>
        <div id="departures"><!-- Populated by app.js --></div>
        <div id="board-footer"><!-- Reserved for weather / info panel --></div>
    </div>

    <!-- ── Status overlay ── -->
    <div id="status-overlay" class="hidden">
        <div class="config-topbar">
            <button id="status-back">← Retour</button>
            <h1 class="config-heading">État du système</h1>
        </div>
        <div id="status-tabs">
            <button class="status-tab active" data-tab="cts">CTS</button>
            <button class="status-tab" data-tab="meteoblue">Météoblue</button>
        </div>
        <div id="status-content"></div>
    </div>

    <!-- ── Configuration overlay ── -->
    <div id="config-overlay" class="hidden">

        <!-- Level 1 : stop name picker -->
        <div id="config-level1">
            <div class="config-topbar">
                <button id="config-back">← Retour</button>
                <h1 class="config-heading">Choisir un arrêt</h1>
            </div>
            <div id="config-search-bar">
                <input id="config-filter" type="text"
                       placeholder="Filtrer par nom d'arrêt…"
                       autocomplete="off" spellcheck="false">
            </div>
            <div id="config-loading">Chargement des arrêts…</div>
            <div id="stops-grid"></div>
        </div>

        <!-- Level 2 : transport type + direction picker -->
        <div id="config-level2" class="hidden">
            <div class="config-topbar">
                <button id="config-back2">← Arrêts</button>
                <div class="config-heading-group">
                    <h1 class="config-heading" id="config-stop-title">—</h1>
                    <span class="config-subheading">Choisir le type et le sens</span>
                </div>
            </div>
            <div id="config-loading2" class="hidden">Chargement des directions…</div>
            <div id="directions-grid"></div>
        </div>

    </div>

    <!-- ── Weather icon sprite sheet (hidden) ── -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
      <defs>

        <!-- ☀ Sunny (pictocode 1) -->
        <symbol id="w-sunny" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="13" fill="#FFD600"/>
          <g stroke="#FFD600" stroke-width="3.5" stroke-linecap="round">
            <line x1="32" y1="6"  x2="32" y2="12"/>
            <line x1="32" y1="52" x2="32" y2="58"/>
            <line x1="6"  y1="32" x2="12" y2="32"/>
            <line x1="52" y1="32" x2="58" y2="32"/>
            <line x1="13.9" y1="13.9" x2="18.1" y2="18.1"/>
            <line x1="45.9" y1="45.9" x2="50.1" y2="50.1"/>
            <line x1="50.1" y1="13.9" x2="45.9" y2="18.1"/>
            <line x1="18.1" y1="45.9" x2="13.9" y2="50.1"/>
          </g>
        </symbol>

        <!-- 🌤 Mostly sunny (pictocodes 2, 3, 30) -->
        <symbol id="w-mostly-sunny" viewBox="0 0 64 64">
          <circle cx="24" cy="22" r="10" fill="#FFD600"/>
          <g stroke="#FFD600" stroke-width="3" stroke-linecap="round">
            <line x1="24" y1="6"  x2="24" y2="10"/>
            <line x1="24" y1="34" x2="24" y2="38"/>
            <line x1="8"  y1="22" x2="12" y2="22"/>
            <line x1="36" y1="22" x2="40" y2="22"/>
            <line x1="12.7" y1="10.7" x2="15.5" y2="13.5"/>
            <line x1="32.5" y1="30.5" x2="35.3" y2="33.3"/>
            <line x1="35.3" y1="10.7" x2="32.5" y2="13.5"/>
            <line x1="15.5" y1="30.5" x2="12.7" y2="33.3"/>
          </g>
          <path d="M52 44 Q52 36 44 36 Q41 30 34 32 Q28 28 26 34 Q20 34 20 41 Q20 48 28 48 L52 48 Q58 48 58 42 Q58 36 52 36 Z"
                fill="#e0e8f0"/>
        </symbol>

        <!-- ⛅ Partly cloudy (pictocode 3 alt) -->
        <symbol id="w-partly-cloudy" viewBox="0 0 64 64">
          <circle cx="22" cy="24" r="10" fill="#FFD600" opacity="0.9"/>
          <path d="M54 43 Q54 34 45 34 Q42 27 34 29 Q27 24 24 31 Q17 31 17 38 Q17 46 26 46 L54 46 Q61 46 61 40 Q61 34 54 34 Z"
                fill="#c8d8e8"/>
        </symbol>

        <!-- ☁ Cloudy / Overcast (pictocodes 4, 31, 34) -->
        <symbol id="w-cloudy" viewBox="0 0 64 64">
          <path d="M52 46 Q52 36 42 36 Q39 28 30 30 Q22 26 20 33 Q12 33 12 41 Q12 50 22 50 L52 50 Q60 50 60 43 Q60 36 52 36 Z"
                fill="#9ab0c8"/>
        </symbol>

        <!-- 🌫 Fog (pictocodes 5, 6) -->
        <symbol id="w-fog" viewBox="0 0 64 64">
          <g stroke="rgba(200,220,240,0.85)" stroke-width="3.5" stroke-linecap="round">
            <line x1="8"  y1="20" x2="56" y2="20"/>
            <line x1="12" y1="30" x2="52" y2="30"/>
            <line x1="8"  y1="40" x2="56" y2="40"/>
            <line x1="14" y1="50" x2="50" y2="50"/>
          </g>
        </symbol>

        <!-- 🌦 Drizzle (pictocode 7) -->
        <symbol id="w-drizzle" viewBox="0 0 64 64">
          <path d="M50 36 Q50 26 40 26 Q37 19 28 21 Q21 17 18 24 Q11 24 11 32 Q11 40 20 40 L50 40 Q57 40 57 34 Q57 28 50 28 Z"
                fill="#9ab0c8"/>
          <g fill="#7eb8e8">
            <circle cx="22" cy="47" r="2.5"/>
            <circle cx="32" cy="51" r="2.5"/>
            <circle cx="42" cy="47" r="2.5"/>
          </g>
        </symbol>

        <!-- 🌧 Rain (pictocodes 8, 9, 10, 11, 19, 33, 35) -->
        <symbol id="w-rain" viewBox="0 0 64 64">
          <path d="M50 34 Q50 24 40 24 Q37 17 28 19 Q21 15 18 22 Q11 22 11 30 Q11 38 20 38 L50 38 Q57 38 57 32 Q57 26 50 26 Z"
                fill="#7090b0"/>
          <g stroke="#5ba3d8" stroke-width="2.8" stroke-linecap="round">
            <line x1="20" y1="44" x2="18" y2="52"/>
            <line x1="28" y1="44" x2="26" y2="52"/>
            <line x1="36" y1="44" x2="34" y2="52"/>
            <line x1="44" y1="44" x2="42" y2="52"/>
          </g>
        </symbol>

        <!-- ⛈ Thunderstorm (pictocodes 20–23, 25, 26, 28) -->
        <symbol id="w-thunder" viewBox="0 0 64 64">
          <path d="M50 32 Q50 22 40 22 Q37 15 28 17 Q21 13 18 20 Q11 20 11 28 Q11 36 20 36 L50 36 Q57 36 57 30 Q57 24 50 24 Z"
                fill="#506070"/>
          <path d="M35 36 L28 48 L33 48 L26 60 L38 46 L32 46 Z" fill="#FFD600"/>
          <g stroke="#5ba3d8" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
            <line x1="18" y1="40" x2="16" y2="46"/>
            <line x1="46" y1="40" x2="44" y2="46"/>
          </g>
        </symbol>

        <!-- 🌨 Sleet (pictocodes 12, 13, 24, 27, 29, 32) -->
        <symbol id="w-sleet" viewBox="0 0 64 64">
          <path d="M50 34 Q50 24 40 24 Q37 17 28 19 Q21 15 18 22 Q11 22 11 30 Q11 38 20 38 L50 38 Q57 38 57 32 Q57 26 50 26 Z"
                fill="#8090a8"/>
          <g fill="#7eb8e8">
            <circle cx="20" cy="46" r="2.5"/>
            <circle cx="36" cy="50" r="2.5"/>
          </g>
          <g stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
            <line x1="30" y1="44" x2="30" y2="54"/>
            <line x1="25" y1="49" x2="35" y2="49"/>
            <line x1="26.5" y1="45.5" x2="33.5" y2="52.5"/>
            <line x1="33.5" y1="45.5" x2="26.5" y2="52.5"/>
            <line x1="44" y1="46" x2="44" y2="54"/>
            <line x1="40" y1="50" x2="48" y2="50"/>
          </g>
        </symbol>

        <!-- ❄ Snow (pictocodes 14, 15, 16, 17, 18) -->
        <symbol id="w-snow" viewBox="0 0 64 64">
          <path d="M50 34 Q50 24 40 24 Q37 17 28 19 Q21 15 18 22 Q11 22 11 30 Q11 38 20 38 L50 38 Q57 38 57 32 Q57 26 50 26 Z"
                fill="#8898b0"/>
          <g stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.9">
            <line x1="20" y1="44" x2="20" y2="56"/>
            <line x1="14" y1="50" x2="26" y2="50"/>
            <line x1="15.5" y1="45.5" x2="24.5" y2="54.5"/>
            <line x1="24.5" y1="45.5" x2="15.5" y2="54.5"/>
            <line x1="32" y1="42" x2="32" y2="58"/>
            <line x1="24" y1="50" x2="40" y2="50"/>
            <line x1="26.3" y1="44.3" x2="37.7" y2="55.7"/>
            <line x1="37.7" y1="44.3" x2="26.3" y2="55.7"/>
            <line x1="44" y1="44" x2="44" y2="56"/>
            <line x1="38" y1="50" x2="50" y2="50"/>
          </g>
        </symbol>

        <!-- 🌙 Night clear (pictocodes 101–103) -->
        <symbol id="w-night-clear" viewBox="0 0 64 64">
          <path d="M38 10 Q20 14 20 32 Q20 50 38 54 Q18 54 12 40 Q8 28 16 18 Q22 10 38 10 Z"
                fill="#c8d4e8"/>
          <circle cx="48" cy="14" r="2"   fill="#FFD600" opacity="0.9"/>
          <circle cx="54" cy="26" r="1.5" fill="#FFD600" opacity="0.7"/>
          <circle cx="44" cy="36" r="1.2" fill="#FFD600" opacity="0.6"/>
        </symbol>

        <!-- 🌙☁ Night cloudy (pictocodes 104–107) -->
        <symbol id="w-night-cloudy" viewBox="0 0 64 64">
          <path d="M28 8 Q15 12 15 24 Q15 36 28 40 Q14 40 8 30 Q5 22 11 14 Q16 8 28 8 Z"
                fill="#c8d4e8" opacity="0.85"/>
          <path d="M56 44 Q56 36 48 36 Q45 30 38 32 Q32 28 30 34 Q24 34 24 40 Q24 48 32 48 L56 48 Q62 48 62 42 Q62 36 56 36 Z"
                fill="#8898b0"/>
        </symbol>

      </defs>
    </svg>

    <script src="app.js"></script>
</body>
</html>
