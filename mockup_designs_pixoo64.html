const S = 5; // canvas pixels per LED pixel

function drawChar(ctx, gx, gy, ch, r, g, b, scale) {
  scale = scale || 1;
  const glyph = FONT[ch] || FONT[' '];
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  for (let row = 0; row < 7; row++) {
    const mask = glyph[row];
    for (let col = 0; col < 5; col++) {
      if (mask & (0x80 >> col)) {
        ctx.fillRect((gx + col*scale)*S, (gy + row*scale)*S, scale*S, scale*S);
      }
    }
  }
}

function drawText(ctx, gx, gy, str, r, g, b, scale, clipW) {
  scale = scale || 1;
  const limit = (clipW != null) ? gx + clipW : 999;
  let x = gx;
  for (let i = 0; i < str.length; i++) {
    if (x >= limit) break;
    drawChar(ctx, x, gy, str[i], r, g, b, scale);
    x += 6 * scale;
  }
}

function tw(str, scale) {
  scale = scale || 1;
  return str.length ? str.length * 6 * scale - scale : 0;
}

function fr(ctx, gx, gy, gw, gh, r, g, b) {
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  ctx.fillRect(gx*S, gy*S, gw*S, gh*S);
}

function drawGrid(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.13)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 64; i++) {
    ctx.beginPath(); ctx.moveTo(i*S, 0);    ctx.lineTo(i*S, 64*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,   i*S);  ctx.lineTo(64*S, i*S); ctx.stroke();
  }
}

function badge(ctx, gx, gy, size, letter, r, g, b) {
  fr(ctx, gx, gy, size, size, r, g, b);
  const tx = gx + Math.floor((size-5)/2);
  const ty = gy + Math.floor((size-7)/2);
  drawChar(ctx, tx, ty, letter, 255, 255, 255, 1);
}

const LC = {
  A:[148,  0,211], B:[220, 36, 31], C:[230,125,  0],

function mkCanvas() {
  const c = document.createElement('canvas');
  c.width = 64*S; c.height = 64*S; return c;
}
