<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixoo64 — Ambient Hub Mockup</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; background: #0a0e1a; color: #c8d0e0;
  font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 13px;
}
#app { display: flex; min-height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: 300px; flex-shrink: 0; background: #0d1220;
  border-right: 1px solid #1a2240; display: flex; flex-direction: column;
  overflow-y: auto;
}
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: #1e2d50; border-radius: 3px; }
.sidebar-header {
  padding: 14px 16px 10px; border-bottom: 1px solid #1a2240;
  font-size: 14px; font-weight: 700; color: #ffc107; letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.sidebar-header span { font-size: 11px; font-weight: 400; color: #556; }
.section { border-bottom: 1px solid #141c30; padding: 10px 14px 12px; }
.section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: #445; margin-bottom: 8px;
}
.ctrl { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; min-height: 26px; }
.ctrl label { flex: 1; color: #99a; font-size: 12px; }
.ctrl input[type=range] { flex: 1; accent-color: #ffc107; }
.ctrl .val { color: #ffc107; font-weight: 700; min-width: 28px; text-align: right; font-size: 12px; }
.ctrl input[type=number], .ctrl input[type=text], .ctrl select {
  background: #0e1628; border: 1px solid #1e2e48; color: #aab;
  padding: 3px 7px; border-radius: 4px; font-size: 12px; width: 70px; flex-shrink: 0;
}
.ctrl select { width: 80px; }
.stop-block { margin-bottom: 8px; background: #0e1628; border-radius: 6px; padding: 8px 10px; border: 1px solid #1a2440; }
.stop-block-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.stop-name-input { background: #0d1525; border: 1px solid #1a2240; color: #c0c8e0;
  padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: 600; flex: 1; width: auto; }
.dep-row { display: flex; gap: 4px; align-items: center; margin-bottom: 3px; }
.dep-row input { background: #0d1525; border: 1px solid #1a2240; color: #aab;
  padding: 2px 5px; border-radius: 3px; font-size: 11px; }
.dep-row .dep-line { width: 32px; font-weight: 700; }
.dep-row .dep-dest { width: 56px; }
.dep-row .dep-t { width: 36px; }
.event-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 6px; }
.event-row {
  display: flex; align-items: center; gap: 4px;
  background: #0d1525; border: 1px solid #1a2240; border-radius: 4px; padding: 4px 6px;
}
.event-row input[type=text] { flex: 1; width: auto; font-size: 11px; padding: 2px 5px;
  background: #0a1020; border: 1px solid #1a2240; color: #aab; border-radius: 3px; }
.event-row select { width: 74px; font-size: 11px; background: #0a1020; border: 1px solid #1a2240; color: #aab; border-radius: 3px; padding: 2px 4px; }
.event-del { background: none; border: 1px solid #2a1818; color: #885; border-radius: 3px;
  cursor: pointer; padding: 2px 6px; font-size: 11px; flex-shrink: 0; }
.event-del:hover { background: #2a0a0a; color: #f88; border-color: #f88; }
.add-btn { background: none; border: 1px dashed #1e3020; color: #4a8; border-radius: 4px;
  cursor: pointer; padding: 4px 8px; font-size: 11px; width: 100%; text-align: center; }
.add-btn:hover { background: #0e1e10; border-color: #4a8; }
.bday-row { display: flex; gap: 4px; align-items: center; margin-bottom: 4px; }
.bday-row input { flex: 1; font-size: 11px; background: #0a1020; border: 1px solid #1a2240; color: #aab; padding: 2px 5px; border-radius: 3px; }
.slider-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.slider-row label { display: flex; justify-content: space-between; align-items: baseline; }
.slider-row label span { color: #9aa3b6; font-size: 12px; }
.slider-val { font-family: monospace; font-size: 14px; color: #ffd23f; font-weight: 700; }
.slider-row input[type=range] { width: 100%; accent-color: #ffd23f; height: 4px; }
.play-row { display: flex; gap: 6px; margin-top: 8px; }
.play-btn { flex: 1; background: #1a2e18; border: 1px solid #2e5a28; color: #6df083;
  border-radius: 5px; padding: 6px; font-size: 12px; font-weight: 700; cursor: pointer; }
.play-btn:hover { background: #243e22; }
.play-btn.paused { background: #2e1a14; border-color: #5a3428; color: #f08060; }
.nav-btn { background: #0e1628; border: 1px solid #1e2e48; color: #88a;
  border-radius: 5px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
.nav-btn:hover { background: #162038; }

/* ── Main display ── */
#main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 20px; }
#screen-label { display: flex; align-items: center; gap: 10px; font-size: 12px; color: #8090b0; }
#screen-name { color: #c8d8f8; font-size: 14px; font-weight: 700; }
#screen-remaining { color: #ffd23f; font-family: monospace; font-size: 12px; }
#canvas-wrap { background: #080c16; border-radius: 12px; padding: 14px;
  box-shadow: 0 0 0 2px #1a2240, 0 8px 40px rgba(0,0,0,0.7); }
#display { display: block; image-rendering: pixelated; border-radius: 4px; }
#progress-wrap { width: 100%; max-width: 540px; }
#cycle-bar { display: flex; gap: 3px; height: 28px; border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
.cycle-slot {
  display: flex; align-items: center; justify-content: center;
  font-family: monospace; font-size: 10px; letter-spacing: 0.5px;
  cursor: pointer; transition: outline 0.1s;
}
.cycle-slot.hub   { background: #1a2e40; color: #9cc8ff; }
.cycle-slot.moment { background: #2a1e36; color: #e5b8ff; }
.cycle-slot.active { outline: 2px solid #ffd23f; outline-offset: -2px; }
#progress-track { height: 3px; background: #1a2240; border-radius: 2px; overflow: hidden; }
#progress-bar { height: 100%; background: #ffc107; border-radius: 2px; transition: width 0.1s linear; width: 0%; }
#legend { display: flex; gap: 14px; font-size: 11px; color: #446; flex-wrap: wrap; justify-content: center; }
.leg { display: flex; align-items: center; gap: 4px; }
.leg-dot { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>

  </div>

  <!-- Anniversaires / Jour J -->

    <div class="section-title">Moments</div>

    <div id="bday-list"></div>
    <button class="add-btn" onclick="addBday()">+ Anniversaire</button>

    <div id="event-list" class="event-list"></div>
    <button class="add-btn" onclick="addEvent()">+ Événement</button>
  </div>

  <!-- Paramètres -->
  <div class="section">
    <div class="section-title">Paramètres</div>
    <div class="slider-row">
      <label><span>Durée écran stop</span><span class="slider-val" id="tram-val">6s</span></label>
      <input type="range" id="tram-secs" min="1" max="20" value="6" oninput="updateSliders()">
    </div>
    <div class="slider-row">
      <label><span>Durée écran moment</span><span class="slider-val" id="moment-val">1s</span></label>
      <input type="range" id="moment-secs" min="1" max="10" value="1" oninput="updateSliders()">
    </div>
    <div class="slider-row" style="margin-bottom:0">
      <label><span>Lignes par écran</span><span class="slider-val" id="lines-val" style="color:#b4dcff">4</span></label>
      <input type="range" id="lines-count" min="1" max="4" value="4" oninput="updateSliders()" style="accent-color:#b4dcff">
    </div>
    <div class="play-row">
      <button class="nav-btn" onclick="prevScreen()">◀</button>
      <button class="play-btn" id="play-btn" onclick="togglePlay()">⏸ Pause</button>
      <button class="nav-btn" onclick="nextScreen()">▶</button>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <div id="screen-label">
    <span id="screen-name">Hub · Stop 1</span>
    <span id="screen-remaining">—</span>
  </div>
  <div id="canvas-wrap">
    <canvas id="display"></canvas>
  </div>
  <div id="progress-wrap">
    <div id="cycle-bar"></div>
    <div id="progress-track"><div id="progress-bar"></div></div>
  </div>
  <div id="legend">
    <div class="leg"><div class="leg-dot" style="background:#9cc8ff"></div> Hub (arrêt)</div>
    <div class="leg"><div class="leg-dot" style="background:#e5b8ff"></div> Moment</div>

</div>

// ── Framebuffer ───────────────────────────────────────────────────────────────
class Fb {
  constructor() { this.px = new Uint8Array(64 * 64 * 3); }
  set(x, y, r, g, b) {
    if (x<0||y<0||x>=64||y>=64) return;
    const i = (y*64+x)*3; this.px[i]=r; this.px[i+1]=g; this.px[i+2]=b;
  }
  fillRect(x, y, w, h, r, g, b) {
    for (let dy=0;dy<h;dy++) for (let dx=0;dx<w;dx++) this.set(x+dx,y+dy,r,g,b);
  }
  drawChar(x, y, ch, r, g, b, sc=1) {
    const gl = FONT[ch] || FONT[' '];
    for (let row=0;row<7;row++) {
      const mask=gl[row];
      for (let col=0;col<5;col++) {
        if (mask&(0x80>>col))
          for (let sy=0;sy<sc;sy++) for (let sx=0;sx<sc;sx++)
            this.set(x+col*sc+sx, y+row*sc+sy, r, g, b);
      }
    }
    return x+6*sc;
  }
  drawText(x, y, text, r, g, b, sc=1) {
    let cx=x; for (const ch of String(text)) cx=this.drawChar(cx,y,ch,r,g,b,sc);
    return cx;
  }
  drawTextRight(xr, y, text, r, g, b, sc=1) {
    const n=[...String(text)].length;
    const w=n===0?0:n*6*sc-sc;
    this.drawText(xr-w+1, y, text, r, g, b, sc);
  }
  drawTextCenter(cx, y, text, r, g, b, sc=1) {
    const n=[...String(text)].length;
    const w=n===0?0:n*6*sc-sc;
    this.drawText(cx-Math.floor(w/2), y, text, r, g, b, sc);
  }
  paint(canvas, scale) {
    const ctx=canvas.getContext('2d');
    const img=ctx.createImageData(64*scale, 64*scale);
    const d=img.data;
    for (let y=0;y<64;y++) for (let x=0;x<64;x++) {
      const si=(y*64+x)*3;
      const r=this.px[si],g=this.px[si+1],b=this.px[si+2];
      for (let sy=0;sy<scale;sy++) for (let sx=0;sx<scale;sx++) {
        const di=((y*scale+sy)*64*scale+(x*scale+sx))*4;
        d[di]=r; d[di+1]=g; d[di+2]=b; d[di+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
  }
}

// ── Color palette ─────────────────────────────────────────────────────────────
const BG_NAVY   = [14,20,40];
const DIVIDER   = [30,50,80];
const WHITE     = [255,255,255];
const YELLOW    = [255,220,80];
const AMBER_DIM = [160,122,40];
const TEXT_DIM  = [94,111,142];
const TEXT_MID  = [143,160,187];
const CAKE_GOLD = [255,224,144];
const GIFT_BLUE = [180,200,255];
const HEART_LIL = [220,171,255];
const STAR_GOLD = [255,210,63];

const LINE_COLORS = {
  A:[200,16,46], B:[123,45,139], C:[224,123,16], D:[46,139,60],
  E:[111,44,145], F:[197,20,91], G:[92,107,192]
};
function lineColorRgb(l) { return LINE_COLORS[l] || [84,110,122]; }

function tintBlock(r, g, b) {
  const blend = (l, base) => Math.round(l*0.42 + base*0.58);
  return [blend(r,26), blend(g,38), blend(b,66)];
}

function momentColor(icon) {
  if (icon==='present'||icon==='party') return GIFT_BLUE;
  if (icon==='heart') return HEART_LIL;
  if (icon==='star'||icon==='skull') return STAR_GOLD;
  return CAKE_GOLD;
}

// ── Small weather icon 6×5 ────────────────────────────────────────────────────
function drawWeatherIconSm(fb, x, y, pc) {
  const night=pc>100; const c=night?pc-100:pc;
  if (night&&c<=3) {
    fb.fillRect(x+1,y,4,2,220,220,180); fb.fillRect(x,y+2,2,2,220,220,180); return;
  }
  if (c===1) {
    fb.fillRect(x+2,y,2,1,255,220,0); fb.fillRect(x+1,y+1,4,3,255,220,0); fb.fillRect(x+2,y+4,2,1,255,220,0);
  } else if (c<=3) {
    fb.set(x+4,y,255,200,0); fb.fillRect(x+1,y+1,2,1,255,200,0); fb.fillRect(x,y+2,6,3,200,200,210);
  } else if (c<=4) {
    fb.fillRect(x+1,y,4,2,180,180,200); fb.fillRect(x,y+2,6,3,200,200,210);
  } else if (c<=6) {
    for (let r=0;r<5;r++) { const xo=r%2?1:0; fb.fillRect(x+xo,y+r,5,1,160,160,180); }
  } else if (c<=11||c===19) {
    fb.fillRect(x,y,6,2,100,140,200);
    [1,3,5].forEach(dx=>fb.set(x+dx,y+3,100,160,255));
    [0,2,4].forEach(dx=>fb.set(x+dx,y+4,100,160,255));
  } else if (c<=18) {
    fb.fillRect(x,y,6,2,160,180,220);
    [1,3,5].forEach(dx=>fb.set(x+dx,y+3,220,240,255));
    [0,2,4].forEach(dx=>fb.set(x+dx,y+4,220,240,255));
  } else if (c<=28) {
    fb.fillRect(x,y,6,2,80,80,120); fb.fillRect(x+2,y+2,2,2,255,240,0); fb.fillRect(x+1,y+4,2,1,255,240,0);
  } else {
    fb.fillRect(x+1,y,4,2,160,160,180); fb.fillRect(x,y+2,6,3,180,180,200);
  }
}

// ── Moment icons 6×7 ─────────────────────────────────────────────────────────
function drawIconCake(fb, x, y) {
  fb.set(x+2,y,255,220,80); fb.fillRect(x+2,y+1,1,2,200,200,220);
  fb.fillRect(x,y+3,6,1,210,190,240); fb.fillRect(x,y+4,6,3,190,155,220);
  fb.set(x+1,y+5,255,100,100); fb.set(x+3,y+5,100,200,100); fb.set(x+5,y+5,100,100,255);
}
function drawIconPresent(fb, x, y) {
  fb.fillRect(x,y+3,6,3,91,142,238); fb.fillRect(x,y+2,6,1,122,170,245);
  fb.fillRect(x+2,y+2,2,4,230,220,168); fb.fillRect(x,y+3,6,1,230,220,168);
  fb.fillRect(x+1,y,2,2,232,112,112); fb.fillRect(x+3,y,2,2,232,112,112);
}
function drawIconHeart(fb, x, y) {
  fb.fillRect(x+1,y,2,1,220,60,60); fb.fillRect(x+4,y,2,1,220,60,60);
  fb.fillRect(x,y+1,6,2,220,60,60); fb.fillRect(x+1,y+3,4,2,220,60,60); fb.fillRect(x+2,y+5,2,1,220,60,60);
}
function drawIconStar(fb, x, y) {
  const [r,g,b]=STAR_GOLD;
  fb.fillRect(x+2,y,2,7,r,g,b); fb.fillRect(x,y+2,6,3,r,g,b);
  fb.set(x+1,y+1,r,g,b); fb.set(x+4,y+1,r,g,b);
  fb.set(x+1,y+5,r,g,b); fb.set(x+4,y+5,r,g,b);
}
function drawMomentIcon(fb, icon, x, y) {
  if (icon==='present'||icon==='party') { drawIconPresent(fb,x,y); return; }
  if (icon==='heart') { drawIconHeart(fb,x,y); return; }
  if (icon==='star'||icon==='skull') { drawIconStar(fb,x,y); return; }
  drawIconCake(fb,x,y);
}

// ── Ambient Hub header (y=0..28) ──────────────────────────────────────────────
function drawHubHeader(fb, hours, mins, weather) {
  fb.fillRect(0,0,64,28,...BG_NAVY);
  const hhmm=String(hours).padStart(2,'0')+':'+String(mins).padStart(2,'0');
  fb.drawText(2,2,hhmm,...WHITE,2);
  if (weather && weather.pictocode > 0) {
    drawWeatherIconSm(fb, 2, 20, weather.pictocode);
    fb.drawText(10,19,Math.round(weather.temp_now)+'°',...YELLOW,1);
    fb.drawText(32,19,Math.round(weather.temp_min)+'/'+Math.round(weather.temp_max)+'°',...TEXT_MID,1);
  } else {
    fb.drawText(32,19,'--/--°',...TEXT_DIM,1);
  }
  fb.fillRect(0,28,64,1,...DIVIDER);
}

// ── Departure row block ───────────────────────────────────────────────────────
function drawDepRowBlock(fb, y, h, line, dest, nextMin, afterMin) {
  const [lr,lg,lb]=lineColorRgb(line);
  const [br,bg,bb]=tintBlock(lr,lg,lb);
  fb.fillRect(0,y,64,h,br,bg,bb);
  const ty=y+Math.floor((h-8)/2);
  fb.drawChar(2,ty,line,lr,lg,lb,1);
  const dest4=String(dest).substring(0,4).toUpperCase();
  fb.drawText(10,ty,dest4,...WHITE,1);
  if (nextMin!=null) fb.drawTextRight(49,ty,String(Math.min(nextMin,99)),...YELLOW,1);
  if (afterMin!=null) fb.drawTextRight(63,ty,String(Math.min(afterMin,99)),...AMBER_DIM,1);
}

// ── Hub screen ────────────────────────────────────────────────────────────────
function drawHub(fb, stop, linesPerScreen, weather) {
  const now=new Date();
  fb.fillRect(0,0,64,64,...BG_NAVY);
  drawHubHeader(fb, now.getHours(), now.getMinutes(), weather);
  const deps=(stop.deps||[]).slice(0,linesPerScreen);
  if (deps.length===0) {
    fb.drawTextCenter(31,42,'no data',...TEXT_DIM,1);
    return;
  }
  let rowH, startY, showName;
  if (linesPerScreen===4)      { rowH=8;  startY=30; showName=false; }
  else if (linesPerScreen===3) { rowH=8;  startY=39; showName=true; }
  else if (linesPerScreen===2) { rowH=13; startY=38; showName=true; }
  else                          { rowH=18; startY=42; showName=true; }
  if (showName) {
    const name=String(stop.name||'').substring(0,10);
    fb.drawText(2,30,name,...TEXT_DIM,1);
  }
  deps.forEach((d,i) => drawDepRowBlock(fb,startY+i*rowH,rowH,d.line,d.dest,d.next,d.after));
  if (linesPerScreen===4) fb.fillRect(0,62,64,2,...BG_NAVY);
}

// ── Moment screen ─────────────────────────────────────────────────────────────
function drawMomentHeader(fb, hours, mins) {
  fb.fillRect(0,0,64,10,...BG_NAVY);
  const hhmm=String(hours).padStart(2,'0')+':'+String(mins).padStart(2,'0');
  fb.drawText(17,1,hhmm,...TEXT_MID,1);
  fb.fillRect(0,9,64,1,...DIVIDER);
}

function wrapTo(text, n) {
  const out=[]; let pos=0;
  while (pos<text.length) { out.push(text.slice(pos,pos+n)); pos+=n; }
  return out;
}

function drawMoment(fb, kind, prefix, body, color) {
  const now=new Date();
  fb.fillRect(0,0,64,64,...BG_NAVY);
  drawMomentHeader(fb, now.getHours(), now.getMinutes());
  const [br,bg,bb]=tintBlock(...color);
  fb.fillRect(0,11,64,18,br,bg,bb);
  if (!prefix) {
    drawIconCake(fb,29,17);
  } else {
    drawMomentIcon(fb,kind,4,17);
    fb.drawText(14,13,prefix,...color,2);
  }
  const lines=wrapTo(String(body),10);
  lines.slice(0,4).forEach((l,i)=>fb.drawText(2,31+i*9,l,...WHITE,1));
}

// ── Demo data (editable via sidebar) ─────────────────────────────────────────
let STOPS = [
  { name: 'A-Bugatti', deps: [
    { line:'A', dest:'ILLK', next:3,  after:15 },
    { line:'B', dest:'LING', next:7,  after:18 },
    { line:'D', dest:'POTE', next:5,  after:14 },
    { line:'E', dest:'ROBE', next:9,  after:22 },
  ]},
  { name: 'Centradie', deps: [
    { line:'C', dest:'HOER', next:2,  after:12 },
    { line:'F', dest:'KIBI', next:6,  after:20 },
    { line:'G', dest:'CONT', next:4,  after:11 },
    { line:'A', dest:'GRIF', next:8,  after:24 },
  ]},
];

let WEATHER = { pictocode:2, temp_now:14, temp_min:8, temp_max:19 };

let BIRTHDAYS = ['Marie-Helene'];
let EVENTS = [
  { label:'Voyage en Irlande', days:1, icon:'present' },
  { label:'Anniversaire Mariage', days:15, icon:'heart' },
  { label:'Fete Nationale', days:32, icon:'star' },
];

// ── State ─────────────────────────────────────────────────────────────────────
const SCALE = 8;
const canvas = document.getElementById('display');
canvas.width = 64 * SCALE; canvas.height = 64 * SCALE;
const fb = new Fb();

let tramSecs   = 6;
let momentSecs = 1;
let linesCount = 4;
let pos        = 0;
let elapsed    = 0;
let paused     = false;

function getMoments() {
  const m = [];
  BIRTHDAYS.forEach(name => m.push({ kind:'cake', prefix:'', body:name, color:CAKE_GOLD }));
  EVENTS.forEach(ev => m.push({ kind:ev.icon, prefix:'J-'+ev.days, body:ev.label, color:momentColor(ev.icon) }));
  return m;
}

function buildCycle() {
  const cycle = [];
  STOPS.forEach((s,i) => cycle.push({ type:'hub', idx:i, dur:tramSecs }));
  const moments = getMoments();
  moments.forEach((_,i) => cycle.push({ type:'moment', idx:i, dur:momentSecs }));
  return cycle;
}

function render() {
  const cycle   = buildCycle();
  const moments = getMoments();
  const s       = cycle[pos % cycle.length];
  const now     = new Date();

  if (s.type === 'hub') {
    drawHub(fb, STOPS[s.idx], linesCount, WEATHER);
  } else {
    const m = moments[s.idx];
    if (m) drawMoment(fb, m.kind, m.prefix, m.body, m.color);
    else   drawHub(fb, STOPS[0], linesCount, WEATHER);
  }
  fb.paint(canvas, SCALE);

  // Update UI
  const label = s.type==='hub'
    ? 'Hub · '+(STOPS[s.idx]||{name:'?'}).name
    : 'Moment · '+(moments[s.idx]||{body:'?'}).body;
  document.getElementById('screen-name').textContent = label;
  const remaining = Math.max(0, s.dur - elapsed).toFixed(1);
  document.getElementById('screen-remaining').textContent = remaining+'s / '+s.dur+'s';

  // Progress bar (position within total cycle)
  let cycleTotal = 0, acc = 0;
  cycle.forEach(x => cycleTotal += x.dur);
  for (let i=0; i<pos%cycle.length; i++) acc += cycle[i].dur;
  acc += elapsed;
  document.getElementById('progress-bar').style.width = (acc/cycleTotal*100)+'%';

  // Cycle bar
  const bar = document.getElementById('cycle-bar');
  bar.innerHTML = '';
  cycle.forEach((sl,i) => {
    const d = document.createElement('div');
    d.className = 'cycle-slot '+(sl.type==='hub'?'hub':'moment')+(i===pos%cycle.length?' active':'');
    d.style.flex = sl.dur;
    d.textContent = sl.type==='hub' ? 'S'+(sl.idx+1) : 'M'+(sl.idx+1);
    d.onclick = () => { pos=i; elapsed=0; render(); };
    bar.appendChild(d);
  });
}

// ── Rotation timer ────────────────────────────────────────────────────────────
let lastMinute = new Date().getMinutes();
let lastRenderMs = performance.now();

setInterval(() => {
  if (paused) { render(); return; }
  const now    = new Date();
  const newMin = now.getMinutes();
  elapsed += 0.1;

  const cycle = buildCycle();
  const s = cycle[pos % cycle.length];
  if (elapsed >= s.dur) {
    pos = (pos + 1) % cycle.length;
    elapsed = 0;
    lastMinute = newMin;
    render();
  } else if (newMin !== lastMinute) {
    lastMinute = newMin;
    render();
  } else {
    // Update remaining countdown + progress only
    const remaining = Math.max(0, s.dur - elapsed).toFixed(1);
    document.getElementById('screen-remaining').textContent = remaining+'s / '+s.dur+'s';
    let cycleTotal=0, acc=0;
    cycle.forEach(x=>cycleTotal+=x.dur);
    for (let i=0;i<pos%cycle.length;i++) acc+=cycle[i].dur;
    acc+=elapsed;
    document.getElementById('progress-bar').style.width=(acc/cycleTotal*100)+'%';
  }
}, 100);

// ── Controls ──────────────────────────────────────────────────────────────────
function updateSliders() {
  tramSecs   = parseInt(document.getElementById('tram-secs').value);
  momentSecs = parseInt(document.getElementById('moment-secs').value);
  linesCount = parseInt(document.getElementById('lines-count').value);
  document.getElementById('tram-val').textContent   = tramSecs+'s';
  document.getElementById('moment-val').textContent = momentSecs+'s';
  document.getElementById('lines-val').textContent  = linesCount;
  elapsed = 0; render();
}

function togglePlay() {
  paused = !paused;
  const btn = document.getElementById('play-btn');
  btn.textContent = paused ? '▶ Play' : '⏸ Pause';
  btn.className   = 'play-btn' + (paused ? ' paused' : '');
}

function prevScreen() { const c=buildCycle(); pos=(pos-1+c.length)%c.length; elapsed=0; render(); }
function nextScreen() { const c=buildCycle(); pos=(pos+1)%c.length; elapsed=0; render(); }

// ── Weather inputs ────────────────────────────────────────────────────────────
document.getElementById('wx-pictocode').onchange = function() {
  WEATHER.pictocode = parseInt(this.value); render();
};
document.getElementById('wx-temp').oninput = function() {
  WEATHER.temp_now = parseFloat(this.value)||0; render();
};
document.getElementById('wx-min').oninput = function() {
  WEATHER.temp_min = parseFloat(this.value)||0; render();
};
document.getElementById('wx-max').oninput = function() {
  WEATHER.temp_max = parseFloat(this.value)||0; render();
};

// ── Stop controls ─────────────────────────────────────────────────────────────
function buildStopsUI() {
  const container = document.getElementById('stops-container');
  container.innerHTML = '';
  STOPS.forEach((stop, si) => {
    const block = document.createElement('div');
    block.className = 'stop-block';
    let html = `<div class="stop-block-header">
      <input class="stop-name-input" value="${stop.name}" oninput="STOPS[${si}].name=this.value;render()">
    </div>`;
    stop.deps.forEach((d, di) => {
      html += `<div class="dep-row">
        <input class="dep-line" type="text" value="${d.line}" maxlength="2"
          oninput="STOPS[${si}].deps[${di}].line=this.value.toUpperCase();render()">
        <input class="dep-dest" type="text" value="${d.dest}" maxlength="7"
          oninput="STOPS[${si}].deps[${di}].dest=this.value;render()">
        <input class="dep-t" type="number" value="${d.next}" min="0" max="99"
          oninput="STOPS[${si}].deps[${di}].next=parseInt(this.value)||0;render()">
        <input class="dep-t" type="number" value="${d.after}" min="0" max="99"
          oninput="STOPS[${si}].deps[${di}].after=parseInt(this.value)||0;render()">
      </div>`;
    });
    block.innerHTML = html;
    container.appendChild(block);
  });
}

// ── Moments controls ──────────────────────────────────────────────────────────
function buildMomentsUI() {
  // Birthdays
  const bl = document.getElementById('bday-list');
  bl.innerHTML = '';
  BIRTHDAYS.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'bday-row';
    row.innerHTML = `<input type="text" value="${name}"
        oninput="BIRTHDAYS[${i}]=this.value;render()">
      <button class="event-del" onclick="BIRTHDAYS.splice(${i},1);buildMomentsUI();render()">✕</button>`;
    bl.appendChild(row);
  });

  // Events
  const el = document.getElementById('event-list');
  el.innerHTML = '';
  EVENTS.forEach((ev, i) => {
    const row = document.createElement('div');
    row.className = 'event-row';
    row.innerHTML = `<input type="text" value="${ev.label}"
        oninput="EVENTS[${i}].label=this.value;render()">
      <input type="number" value="${ev.days}" min="0" max="999" style="width:48px;font-size:11px;background:#0a1020;border:1px solid #1a2240;color:#aab;border-radius:3px;padding:2px 4px"
        oninput="EVENTS[${i}].days=parseInt(this.value)||0;buildMomentsUI();render()">
      <select onchange="EVENTS[${i}].icon=this.value;buildMomentsUI();render()">
        ${['star','party','heart','present','skull'].map(ic =>
          `<option value="${ic}"${ic===ev.icon?' selected':''}>${ic}</option>`).join('')}
      </select>
      <button class="event-del" onclick="EVENTS.splice(${i},1);buildMomentsUI();render()">✕</button>`;
    el.appendChild(row);
  });
}

function addBday() {
  BIRTHDAYS.push('Nouveau'); buildMomentsUI(); render();
}
function addEvent() {
  EVENTS.push({ label:'Evenement', days:7, icon:'star' }); buildMomentsUI(); render();
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildStopsUI();
buildMomentsUI();
render();
</script>
