<body>
<h1>Variantes — 2 trams · temps ×2 sans "m" · température même niveau</h1>
<p class="note">5× scale · police bitmap 5×7 réelle · grille pixel visible · "3" = 3 minutes, "18°" = 18 °C</p>
<div class="row" id="designs"></div>
<script>
// ── Font (src/pixoo64/font.rs) ────────────────────────────────────────────────
const FONT = {

  '7':[0xF8,0x08,0x10,0x20,0x20,0x20,0x20],

  'B':[0xF0,0x88,0x88,0xF0,0x88,0x88,0xF0],
  'C':[0x70,0x88,0x80,0x80,0x80,0x88,0x70],
  'D':[0xE0,0x90,0x88,0x88,0x88,0x90,0xE0],

  'P':[0xF0,0x88,0x88,0xF0,0x80,0x80,0x80],
  'Q':[0x70,0x88,0x88,0x88,0xA8,0x90,0x68],
  'R':[0xF0,0x88,0x88,0xF0,0xA0,0x90,0x88],
  'S':[0x70,0x88,0x80,0x70,0x08,0x88,0x70],
  'T':[0xF8,0x20,0x20,0x20,0x20,0x20,0x20],
  'U':[0x88,0x88,0x88,0x88,0x88,0x88,0x70],
  'V':[0x88,0x88,0x88,0x88,0x50,0x50,0x20],
  'W':[0x88,0x88,0x88,0xA8,0xA8,0xD8,0x88],
  'X':[0x88,0x88,0x50,0x20,0x50,0x88,0x88],
  'Y':[0x88,0x88,0x50,0x20,0x20,0x20,0x20],

  'b':[0x80,0x80,0xB0,0xC8,0x88,0xC8,0xB0],

  'f':[0x30,0x40,0xF0,0x40,0x40,0x40,0x40],
  'g':[0x00,0x68,0x98,0x88,0x78,0x08,0x70],
  'h':[0x80,0x80,0xB0,0xC8,0x88,0x88,0x88],
  'i':[0x20,0x00,0x60,0x20,0x20,0x20,0x70],
  'j':[0x10,0x00,0x30,0x10,0x10,0x90,0x60],
  'k':[0x80,0x90,0xA0,0xC0,0xA0,0x90,0x88],
  'l':[0x60,0x20,0x20,0x20,0x20,0x20,0x70],
  'm':[0x00,0x00,0xD0,0xA8,0xA8,0xA8,0x88],
  'n':[0x00,0x00,0xB0,0xC8,0x88,0x88,0x88],
  'o':[0x00,0x00,0x70,0x88,0x88,0x88,0x70],

  'u':[0x00,0x00,0x88,0x88,0x88,0x98,0x68],
  'v':[0x00,0x00,0x88,0x88,0x88,0x50,0x20],
  'w':[0x00,0x00,0x88,0xA8,0xA8,0xD8,0x88],
  'x':[0x00,0x00,0x88,0x50,0x20,0x50,0x88],
  'y':[0x00,0x88,0x88,0x78,0x08,0x88,0x70],
  'z':[0x00,0x00,0xF8,0x10,0x20,0x40,0xF8],
  '°':[0x60,0x90,0x90,0x60,0x00,0x00,0x00],
  '*':[0x00,0x20,0xA8,0x70,0xA8,0x20,0x00],
  '+':[0x00,0x20,0x20,0xF8,0x20,0x20,0x00],
};

const S = 5;

function drawChar(ctx, gx, gy, ch, r, g, b, sc) {
  sc = sc || 1;
  const gl = FONT[ch] || FONT[' '];
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  for (let row = 0; row < 7; row++) {
    const mask = gl[row];
    for (let col = 0; col < 5; col++) {
      if (mask & (0x80 >> col))
        ctx.fillRect((gx+col*sc)*S, (gy+row*sc)*S, sc*S, sc*S);
    }
  }
}

function drawText(ctx, gx, gy, str, r, g, b, sc, clipW) {
  sc = sc || 1;
  const lim = (clipW != null) ? gx+clipW : 999;
  let x = gx;
  for (const ch of str) {
    if (x >= lim) break;
    drawChar(ctx, x, gy, ch, r, g, b, sc);
    x += 6*sc;
  }
}

function tw(str, sc) { sc=sc||1; return str.length ? str.length*6*sc - sc : 0; }

function fr(ctx, gx, gy, gw, gh, r, g, b) {
  ctx.fillStyle = 'rgb('+r+','+g+','+b+')';
  ctx.fillRect(gx*S, gy*S, gw*S, gh*S);
}

function drawGrid(ctx) {
  ctx.strokeStyle = 'rgba(255,255,255,0.13)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 64; i++) {
    ctx.beginPath(); ctx.moveTo(i*S,0);    ctx.lineTo(i*S,64*S); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*S);    ctx.lineTo(64*S,i*S); ctx.stroke();
  }
}

function badge(ctx, gx, gy, size, letter, r, g, b) {
  fr(ctx, gx, gy, size, size, r, g, b);
  drawChar(ctx, gx+Math.floor((size-5)/2), gy+Math.floor((size-7)/2), letter, 255, 255, 255, 1);
}

// Right-align text ending at pixel rx
function drawTextR(ctx, rx, gy, str, r, g, b, sc) {
  sc = sc||1;
  drawText(ctx, rx - tw(str,sc), gy, str, r, g, b, sc);
}

const LC = { A:[148,0,211], B:[220,36,31], D:[0,90,200], E:[0,160,60] };

function mkCanvas() {
  const c = document.createElement('canvas');
  c.width = 64*S; c.height = 64*S; return c;
}

// ── Variant A ─────────────────────────────────────────────────────────────────
// Header séparé (h=16): heure×1 gauche + "18°" ×2 droite (64px total exact)
// 2 grandes lignes tram (h=23 chacune): badge + dest + numéro ×2 droit
// Pied (h=2): reste
//
// "11:42" ×1 = 30px  |  "18°" ×2 = 34px  →  30+34 = 64px pile
function variantA() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx,0,0,64,64, 6,8,18);

  // Header
  fr(ctx,0,0,64,16, 16,16,36);
  drawText(ctx, 1, 4,  '11:42', 200,220,255, 1);   // x=1, y=4 (centré dans 16px)
  drawText(ctx, 30, 1, '18°',   80,210,255,  2);   // x=30, y=1 → 30+34=64
  fr(ctx,0,16,64,1, 45,52,90);

  // Tram A (y=17, h=23)
  fr(ctx,0,17,64,23, 10,12,26);
  badge(ctx, 1,20, 13, 'A', ...LC.A);
  drawText(ctx, 16,19, 'Illkirch',   180,190,220, 1, 30);
  drawText(ctx, 16,27, 'Lixenbuhl', 110,118,148, 1, 30);
  drawTextR(ctx, 63,21, '3', 255,215,55, 2);
  fr(ctx,0,40,64,1, 38,44,78);

  // Tram D (y=41, h=23)
  fr(ctx,0,41,64,23, 8,10,24);
  badge(ctx, 1,44, 13, 'D', ...LC.D);
  drawText(ctx, 16,43, 'Robertsau',  180,190,220, 1, 30);
  drawText(ctx, 16,51, 'Boecklin',   110,118,148, 1, 30);
  drawTextR(ctx, 63,45, '7', 255,215,55, 2);

  fr(ctx,0,64,64,1, 20,22,45);
  drawGrid(ctx); return c;
}

// ── Variant B ─────────────────────────────────────────────────────────────────
// Pas de header séparé — heure et température intégrées dans la 1ère ligne tram
// Ligne A: badge + "Illkirch" + heure ×2 droite
//          sous le badge: "11:42" ×1 + "18°" ×1
// Ligne D: normal
// Évènements en bas (birthday + jour j)
function variantB() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx,0,0,64,64, 6,8,18);

  // Tram A (y=0, h=26): zone plus haute pour loger heure+météo sous le badge
  fr(ctx,0,0,64,26, 14,12,28);
  badge(ctx, 1,1, 13, 'A', ...LC.A);
  // sous le badge: "11:42" + "18°" à ×1
  drawText(ctx, 1,15, '11:42', 180,195,230, 1);
  drawText(ctx, 32,15, '18°',  70,190,240, 1);
  // destination + time ×2 à droite
  drawText(ctx, 16,2, 'Illkirch',  185,195,222, 1, 29);
  drawText(ctx, 16,10,'Lixenbuhl', 110,118,148, 1, 29);
  drawTextR(ctx, 63,6, '3', 255,215,55, 2);
  fr(ctx,0,26,64,1, 42,48,85);

  // Tram D (y=27, h=22)
  fr(ctx,0,27,64,22, 8,10,22);
  badge(ctx, 1,30, 13, 'D', ...LC.D);
  drawText(ctx, 16,29, 'Robertsau',  180,190,220, 1, 29);
  drawText(ctx, 16,37, 'Boecklin',   110,118,148, 1, 29);
  drawTextR(ctx, 63,31, '7', 255,215,55, 2);
  fr(ctx,0,49,64,1, 38,44,78);

  // Birthday (y=50, h=7) + Jour J (y=57, h=7)
  fr(ctx,0,50,64,7, 35,12,35);
  drawText(ctx, 1,51, '* Jib M  Oscar', 255,145,195, 1, 62);
  fr(ctx,0,57,64,1, 55,35,60);
  fr(ctx,0,58,64,6, 35,28,8);
  drawText(ctx, 1,59, 'J-4 Fete Nat.', 255,200,55, 1, 62);

  drawGrid(ctx); return c;
}

// ── Variant C ─────────────────────────────────────────────────────────────────
// Header "zone info" compact (h=9): heure×1 + temp×1
// Bandes tram larges (h=25 each): badge pleine hauteur gauche + dest+temps ×2 droite
// Le badge est une barre verticale de la couleur de la ligne (pas un carré)
function variantC() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx,0,0,64,64, 5,7,16);

  // Header (h=9)
  fr(ctx,0,0,64,9, 16,16,35);
  drawText(ctx, 1,1, '11:42', 190,210,250, 1);
  drawTextR(ctx, 63,1, '18°', 70,195,245, 1);
  fr(ctx,0,9,64,1, 45,50,88);

  // Tram A (y=10, h=26)
  const[ar,ag,ab]=LC.A;
  fr(ctx,0,10,64,26, ar*.12|0, ag*.12|0, ab*.12|0);
  fr(ctx,0,10,5,26, ar,ag,ab);             // barre verticale couleur
  badge(ctx, 6,16, 13, 'A', ar,ag,ab);
  drawText(ctx, 21,12, 'Illkirch',   185,195,222, 1, 26);
  drawText(ctx, 21,20, 'Lixenbuhl', 110,118,148, 1, 26);
  drawTextR(ctx, 63,13, '3', 255,215,55, 2);
  fr(ctx,0,36,64,1, 38,44,78);

  // Tram D (y=37, h=26)
  const[dr,dg,db]=LC.D;
  fr(ctx,0,37,64,26, dr*.12|0, dg*.12|0, db*.12|0);
  fr(ctx,0,37,5,26, dr,dg,db);
  badge(ctx, 6,43, 13, 'D', dr,dg,db);
  drawText(ctx, 21,39, 'Robertsau',  180,190,220, 1, 26);
  drawText(ctx, 21,47, 'Boecklin',   110,118,148, 1, 26);
  drawTextR(ctx, 63,40, '7', 255,215,55, 2);

  fr(ctx,0,63,64,1, 30,34,60);
  drawGrid(ctx); return c;
}

// ── Variant D ─────────────────────────────────────────────────────────────────
// Panneau gauche (20px): horloge verticale ×2 + température ×2
// Séparateur + 2 lignes tram droite (44px) avec destination courte + temps ×2
function variantD() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx,0,0,64,64, 5,7,16);

  // Panneau gauche
  fr(ctx,0,0,20,64, 12,12,30);
  drawText(ctx, 1,2,  '11', 210,230,255, 2);   // "11" ×2 = 22px
  fr(ctx,2,16,16,1, 65,75,130);
  drawText(ctx, 1,18, '42', 170,192,235, 2);
  fr(ctx,2,34,16,1, 50,60,110);
  // température ×2 — "18°" = 34px > 20px, donc "18" + "°" sur 2 lignes
  drawText(ctx, 1,36, '18', 60,185,250, 2);
  drawChar(ctx, 1,52, '°', 60,185,250, 2);
  fr(ctx,20,0,1,64, 50,56,98);

  // Zone trams (21–63, 43px large)
  fr(ctx,21,0,43,64, 5,6,14);

  // Tram A (y=5, h=26)
  badge(ctx, 22,8, 13, 'A', ...LC.A);
  drawText(ctx, 37,8,  'Illkirch',   180,190,220, 1, 14);
  drawText(ctx, 37,16, 'Lixenbuhl', 105,113,142, 1, 14);
  drawTextR(ctx, 63,10, '3', 255,215,55, 2);
  fr(ctx,21,27,43,1, 38,44,78);

  // Tram D (y=29)
  badge(ctx, 22,33, 13, 'D', ...LC.D);
  drawText(ctx, 37,33, 'Robertsau',  180,190,220, 1, 14);
  drawText(ctx, 37,41, 'Boecklin',   105,113,142, 1, 14);
  drawTextR(ctx, 63,35, '7', 255,215,55, 2);
  fr(ctx,21,53,43,1, 38,44,78);

  // Pied trams: birthday compact
  fr(ctx,21,54,43,10, 22,14,28);
  drawText(ctx, 22,57, '* Jib M', 255,145,195, 1, 40);

  drawGrid(ctx); return c;
}

// ── Variant E ─────────────────────────────────────────────────────────────────
// Deux lignes tram occupent les 2/3 supérieurs (h=22 each)
// Header fusionné DANS le badge: badge large (22×22) avec lettre ×2
// Température + heure à droite du badge dans un sous-titre
// Pied: birthday + jour J sur 2 demi-colonnes
function variantE() {
  const c = mkCanvas(); const ctx = c.getContext('2d');
  fr(ctx,0,0,64,64, 5,7,16);

  // ── Tram A (y=0, h=22) ────────────────────────────────────────────────────
  const[ar,ag,ab]=LC.A;
  fr(ctx,0,0,64,22, ar*.14|0, ag*.14|0, ab*.14|0);
  // grand badge carré 20×22 (full height)
  fr(ctx,0,0,20,22, ar,ag,ab);
  drawChar(ctx, 5,7, 'A', 255,255,255, 2);
  // heure + température sur même ligne à droite du badge
  drawText(ctx, 22,1,  '11:42', 190,210,250, 1);
  drawTextR(ctx, 63,1, '18°',   65,195,248, 1);
  // destination + temps ×2
  drawText(ctx, 22,10, 'Illkirch',    185,195,222, 1, 26);
  drawTextR(ctx, 63,10, '3', 255,215,55, 2);
  fr(ctx,0,22,64,1, 45,50,90);

  // ── Tram D (y=23, h=22) ───────────────────────────────────────────────────
  const[dr,dg,db]=LC.D;
  fr(ctx,0,23,64,22, dr*.14|0, dg*.14|0, db*.14|0);
  fr(ctx,0,23,20,22, dr,dg,db);
  drawChar(ctx, 5,30, 'D', 255,255,255, 2);
  drawText(ctx, 22,24, 'Robertsau',  185,195,222, 1, 26);
  drawTextR(ctx, 63,24, '7', 255,215,55, 2);
  // 2ème passage
  drawText(ctx, 22,33, 'suiv. 20',   120,128,155, 1, 40);
  fr(ctx,0,45,64,1, 42,48,85);

  // ── Pied: birthday gauche / jour J droite (h=18) ─────────────────────────
  fr(ctx,0,46,32,18, 35,12,38);
  drawText(ctx, 1,47, '* Jib M', 255,145,195, 1, 30);
  drawText(ctx, 1,55, 'Oscar',   230,120,178, 1, 30);
  fr(ctx,32,46,1,18, 55,40,65);
  fr(ctx,33,46,31,18, 38,28,8);
  drawText(ctx, 34,47, 'J-4', 255,200,55, 1, 29);
  drawText(ctx, 34,55, 'Fete Nat.', 230,175,45, 1, 29);

  drawGrid(ctx); return c;
}

// ── Render ────────────────────────────────────────────────────────────────────
const VARIANTS = [
  { fn: variantA, title: 'A — Header séparé',
    desc: 'Heure ×1 + "18°" ×2 partagent exactement 64px (30+34). 2 lignes larges avec destination sur 2 niveaux.' },
  { fn: variantB, title: 'B — Météo sous le badge A',
    desc: 'Heure et température glissées sous le badge de la 1ère ligne. Événements en pied de page.' },
  { fn: variantC, title: 'C — Barre verticale couleur',
    desc: 'Header compact heure+température ×1. Bandes tram avec accent couleur pleine hauteur à gauche.' },
  { fn: variantD, title: 'D — Panneau horloge gauche',
    desc: 'Panneau 20px: heures ×2 / minutes ×2 / "18°" ×2 empilés. 4 destinations courtes à droite.' },
  { fn: variantE, title: 'E — Badge pleine hauteur',
    desc: 'Badge 20×22 pleine hauteur. Heure + "18°" ×1 en en-tête dans la zone badge. 2ème passage visible.' },
];

const container = document.getElementById('designs');
for (const v of VARIANTS) {
  const card = document.createElement('div'); card.className = 'card';
  const h2 = document.createElement('h2'); h2.textContent = v.title;
  const canvas = v.fn();
  const p = document.createElement('p'); p.textContent = v.desc;
  card.append(h2, canvas, p);
  container.appendChild(card);
}
</script>
